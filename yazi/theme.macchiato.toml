	# Special file
	{ url = "*", is = "orphan", bg = "#ed8796" },
	{ url = "*", is = "exec"  , fg = "#a6da95" },

	# Dummy file
	{ url = "*", is = "dummy", bg = "#ed8796" },
	{ url = "*/", is = "dummy", bg = "#ed8796" },

	# Fallback
	{ url = "*/", fg = "#8aadf4" },
]

