# Catppuccin statusline locally; gruvbox-material when tmux runs inside an SSH session.
if-shell 'test -n "$SSH_CONNECTION" -o -n "$SSH_CLIENT"' \
  'source-file ~/.config/tmux/statusline-remote.conf' \
  'source-file ~/.config/tmux/statusline.conf'
source-file ~/.config/tmux/keybindings.conf

# Make windows hoverable
set -g mouse on
