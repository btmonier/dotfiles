##### Status bar (gruvbox-material dark / hard — SSH session) #####
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1d2021,fg=#d4be98"

##### Messages #####
set -g message-style "bg=#7daea3,fg=#1d2021"
set -g message-command-style "bg=#d8a657,fg=#1d2021"

##### Pane borders #####
set -g pane-border-style "fg=#282828"
set -g pane-active-border-style "fg=#7daea3"

##### Window list #####
set -g window-status-separator ""

set -g window-status-style "bg=#1d2021,fg=#a89984"
set -g window-status-format "#[fg=#1d2021,bg=#1d2021]#[fg=#a89984,bg=#1d2021] #I:#W #[fg=#1d2021,bg=#1d2021]"

set -g window-status-current-style "bg=#1d2021,fg=#1d2021,bold"
set -g window-status-current-format "#[fg=#7daea3,bg=#1d2021]#[fg=#1d2021,bg=#7daea3,bold] #I:#W #[fg=#7daea3,bg=#1d2021]"

##### Left side (session) #####
set -g status-left-length 40
set -g status-left "#[fg=#d3869b,bg=#1d2021]#[fg=#1d2021,bg=#d3869b,bold] #S #[fg=#d3869b,bg=#1d2021] "

##### Right side #####
# Custom message (change this or override with: tmux set -g @status_message "Your text")
# set -g @status_message "Hello"
set -g status-right-length 120
set -g status-right "#[fg=#a9b665,bg=#1d2021]#[fg=#1d2021,bg=#a9b665] #h #[fg=#a9b665,bg=#1d2021] #[fg=#d8a657,bg=#1d2021]#[fg=#1d2021,bg=#d8a657] %Y-%m-%d #[fg=#d8a657,bg=#1d2021] #[fg=#7daea3,bg=#1d2021]#[fg=#1d2021,bg=#7daea3,bold] %H:%M #[fg=#7daea3,bg=#1d2021]"
