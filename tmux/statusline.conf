##### Status bar #####
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#181825,fg=#cdd6f4"

##### Messages #####
set -g message-style "bg=#89b4fa,fg=#1e1e2e"
set -g message-command-style "bg=#f9e2af,fg=#1e1e2e"

##### Pane borders #####
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

##### Window list #####
set -g window-status-separator ""

set -g window-status-style "bg=#181825,fg=#6c7086"
set -g window-status-format "#[fg=#181825,bg=#181825]#[fg=#6c7086,bg=#181825] #I:#W #[fg=#181825,bg=#181825]"

set -g window-status-current-style "bg=#181825,fg=#1e1e2e,bold"
set -g window-status-current-format "#[fg=#89b4fa,bg=#181825]#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W #[fg=#89b4fa,bg=#181825]"

##### Left side (session) #####
set -g status-left-length 40
set -g status-left "#[fg=#cba6f7,bg=#181825]#[fg=#1e1e2e,bg=#cba6f7,bold] #S #[fg=#cba6f7,bg=#181825] "

##### Right side #####
# Custom message (change this or override with: tmux set -g @status_message "Your text")
# set -g @status_message "Hello"
set -g status-right-length 120
set -g status-right "#[fg=#a6e3a1,bg=#181825]#[fg=#1e1e2e,bg=#a6e3a1] #h #[fg=#a6e3a1,bg=#181825] #[fg=#f9e2af,bg=#181825]#[fg=#1e1e2e,bg=#f9e2af] %Y-%m-%d #[fg=#f9e2af,bg=#181825] #[fg=#89b4fa,bg=#181825]#[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M #[fg=#89b4fa,bg=#181825]"
